# docker-compose.yml
# Class 2 | ETL & Pipeline Orchestration | ESILV MSc A4
#
# Start all services: docker compose up -d
# Stop (keep data volumes): docker compose down
# Stop + wipe all data: docker compose down -v
#
# Access pgAdmin: http://YOUR-EC2-IP:5050
# Login email: admin@etl.local
# Login password: admin
#
# Connect pgAdmin to PostgreSQL:
# Host: postgres Port: 5432 Database: etl_db
# Username: etl_user Password: etl_password
services:
  postgres:
    image: postgres:17-alpine
    container_name: etl_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: etl_db
      POSTGRES_USER: etl_user
      POSTGRES_PASSWORD: etl_password
    ports:
      - "5432:5432"
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etl_user -d etl_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:9
    container_name: etl_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: "admin@example.com"
      PGADMIN_DEFAULT_PASSWORD: "admin"
      PGADMIN_CONFIG_PROXY_X_FOR_COUNT: "1"
      PGADMIN_CONFIG_SERVER_MODE: "True"
    ports:
      - "5050:80"
    volumes:
      - ./volumes/pgadmin:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
